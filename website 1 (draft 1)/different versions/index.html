<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Informatics Problem Bank</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/clike/clike.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap');
        
        :root {
            --light-green: #b8f0d8;
            --green: #5cc9a0;
            --white: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #f0fff4 0%, #e6f7e9 100%);
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar { width: 280px; background: var(--white); border-right: 1px solid #ddd; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.05); overflow-y: auto; }
        .logo { font-size: 24px; font-weight: 700; color: var(--green); margin-bottom: 30px; }
        .sidebar button { background: var(--light-green); border: none; padding: 12px 16px; margin: 6px 0; border-radius: 20px; cursor: pointer; width: 100%; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .cc-btn { width: 55px; height: 55px; border-radius: 50%; overflow: hidden; cursor: pointer; border: 3px solid var(--light-green); background-size: cover; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🧠 Informatics Bank</div>
        <button onclick="showHome()">🏠 Home</button>
        <div style="margin:20px 0 10px;">
            <button onclick="newFile()" style="background:#5cc9a0;color:white;">+ New File</button>
        </div>
        <div id="files-list"></div>
    </div>

    <div class="main">
        <div class="header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
            <h1>Welcome to My Informatics Problem Bank</h1>
            <div onclick="openCCModal()" class="cc-btn" style="background-image: url('https://files.catbox.moe/0v4l2k.jpg');"></div>
        </div>
        
        <!-- Home & Branch Content same as before (omitted for brevity, keep previous structure) -->
        <div id="home-page" class="content-area active" style="background:white;padding:40px;border-radius:20px;">
            <h2 style="color:#5cc9a0;">📚 Personal Informatics Repository</h2>
            <p>Create Files and Branches to organize your contest problems.</p>
        </div>
        
        <div id="branch-content" class="content-area">
            <!-- Image, Notes, Code sections (same as previous version) -->
            <div style="display:flex;justify-content:space-between;">
                <h2 id="branch-title"></h2>
                <button onclick="saveCurrentBranch()" style="background:#5cc9a0;color:white;border:none;padding:10px 24px;border-radius:9999px;">💾 Save</button>
            </div>
            <!-- ... 其他内容保持上一个版本 ... -->
        </div>
    </div>

    <!-- CC Modal -->
    <div id="cc-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; width:90%; max-width:1100px; height:80vh; border-radius:25px; display:flex;">
            <div style="flex:1; background:#f0fff4; display:flex; align-items:center; justify-content:center; padding:40px;">
                <img id="cc-image" src="https://files.catbox.moe/0v4l2k.jpg" style="max-height:85%; border-radius:20px;">
            </div>
            <div style="flex:1; padding:40px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;">
                <div id="cc-status" style="font-size:22px; font-weight:600; color:#5cc9a0;">No pizza fed today...</div>
                <div onclick="feedPizza()" style="width:190px; height:190px; background:#fff9e6; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer;">
                    <img src="https://files.catbox.moe/8y5p3v.png" style="width:135px;">
                </div>
                <div style="text-align:center;">
                    <div id="pizza-count" style="font-size:32px; color:#ff9800; font-weight:bold;">0</div>
                    <div>Today's Pizzas</div>
                </div>
                <button onclick="closeCCModal()" style="background:#5cc9a0; color:white; padding:12px 40px; border-radius:9999px;">Close</button>
            </div>
        </div>
    </div>

    <script>
        let data = { files: [], pizzas: 0, lastUploadDate: null, hasUploadedToday: false };
        let codeMirrorInstance = null;
        let currentImageData = null;
        let currentFileIndex = null;
        let currentBranchIndex = null;

        function loadData() {
            const saved = localStorage.getItem('informaticsDB');
            if (saved) data = JSON.parse(saved);
            checkDailyReset();
            renderFiles();
        }

        function saveData() { localStorage.setItem('informaticsDB', JSON.stringify(data)); }

        function checkDailyReset() {
            const today = new Date().toISOString().split('T')[0];
            if (data.lastUploadDate !== today) {
                data.hasUploadedToday = false;
                data.lastUploadDate = today;
                saveData();
            }
        }

        function awardPizza() {
            checkDailyReset();
            data.pizzas += 1;
            saveData();
        }

        function renderFiles() {
            const container = document.getElementById('files-list');
            container.innerHTML = '';
            data.files.forEach((file, fIdx) => {
                const fileDiv = document.createElement('div');
                fileDiv.style.marginBottom = '10px';
                const fileBtn = document.createElement('button');
                fileBtn.textContent = `📁 ${file.name}`;
                fileBtn.onclick = () => { file.expanded = !file.expanded; renderFiles(); };
                fileDiv.appendChild(fileBtn);
                
                const branchesDiv = document.createElement('div');
                branchesDiv.style.marginLeft = '20px';
                branchesDiv.style.display = file.expanded ? 'block' : 'none';
                
                file.branches.forEach((branch, bIdx) => {
                    const bBtn = document.createElement('button');
                    bBtn.textContent = `├─ ${branch.name}`;
                    bBtn.style.fontSize = '14px';
                    bBtn.onclick = () => openBranch(fIdx, bIdx);
                    branchesDiv.appendChild(bBtn);
                });
                
                const addBranchBtn = document.createElement('button');
                addBranchBtn.textContent = '+ New Branch';
                addBranchBtn.style.fontSize = '13px';
                addBranchBtn.onclick = () => newBranch(fIdx);
                branchesDiv.appendChild(addBranchBtn);
                
                fileDiv.appendChild(branchesDiv);
                container.appendChild(fileDiv);
            });
        }

        function newFile() {
            const name = prompt("New File name:", "New File");
            if (!name) return;
            data.files.push({ name: name, expanded: true, branches: [] });
            saveData();
            renderFiles();
            awardPizza();   // Only award when creating File
            alert("✅ New File created! +1 Pizza 🍕");
        }

        function newBranch(fileIdx) {
            const name = prompt("New Branch name:", "New Branch");
            if (!name) return;
            data.files[fileIdx].branches.push({
                name: name,
                notes: "",
                code: "// Write your C++ code here\n#include <bits/stdc++.h>\nusing namespace std;\n\nint main() {\n    cout << \"Hello!\" << endl;\n    return 0;\n}",
                image: null
            });
            saveData();
            renderFiles();
            awardPizza();   // Only award when creating Branch
            alert("✅ New Branch created! +1 Pizza 🍕");
        }

        function openBranch(fIdx, bIdx) {
            currentFileIndex = fIdx;
            currentBranchIndex = bIdx;
            const branch = data.files[fIdx].branches[bIdx];
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('branch-content').classList.add('active');
            document.getElementById('branch-title').textContent = `${data.files[fIdx].name} → ${branch.name}`;
            // ... (rest of openBranch same as before)
        }

        // CC functions
        function openCCModal() {
            document.getElementById('cc-modal').style.display = 'flex';
            document.getElementById('pizza-count').textContent = data.pizzas;
        }
        function closeCCModal() { document.getElementById('cc-modal').style.display = 'none'; }
        function feedPizza() {
            if (data.pizzas > 0) {
                data.pizzas--;
                saveData();
                document.getElementById('pizza-count').textContent = data.pizzas;
                alert("🍕 Fed CC! She is happy now~");
            } else {
                alert("No pizza left today~");
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
