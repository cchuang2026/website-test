<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Informatics Problem Bank</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/clike/clike.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap');
        
        :root {
            --light-green: #b8f0d8;
            --green: #5cc9a0;
            --white: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #f0fff4 0%, #e6f7e9 100%);
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .sidebar {
            width: 280px;
            background: var(--white);
            border-right: 1px solid #ddd;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            overflow-y: auto;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--green);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sidebar button {
            background: var(--light-green);
            border: none;
            color: #333;
            padding: 12px 16px;
            margin: 6px 0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
            text-align: left;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .sidebar button:hover {
            background: #a0e8c8;
            transform: translateY(-2px);
        }
        
        .main { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .cc-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid var(--light-green);
            box-shadow: 0 4px 15px rgba(184, 240, 216, 0.6);
        }
        
        .intro, .content-area {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .content-area { display: none; flex-direction: column; gap: 25px; flex: 1; }
        .active { display: flex; }
        
        .image-section {
            border: 2px dashed var(--light-green);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }
        
        .note-area {
            width: 100%;
            height: 180px;
            border: 2px solid var(--light-green);
            border-radius: 15px;
            padding: 15px;
            font-size: 16px;
            resize: vertical;
        }
        
        .CodeMirror {
            height: 320px;
            border-radius: 12px;
            border: 1px solid #ddd;
        }
        
        .pizza-feed img { width: 130px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🧠 Informatics Bank</div>
        <button onclick="showHome()" class="rounded-btn">🏠 Home</button>
        <div style="margin-top: 20px;">
            <button onclick="newFile()" style="background: var(--green); color: white;">+ New File</button>
        </div>
        <div id="files-list" style="margin-top: 15px;"></div>
    </div>
    
    <div class="main">
        <div class="header">
            <h1 id="page-title">Welcome to My Informatics Problem Bank</h1>
            <div onclick="openCCModal()" class="cc-btn" style="background-image: url('https://files.catbox.moe/0v4l2k.jpg'); background-size: cover;"></div>
        </div>
        
        <div id="home-page" class="content-area active">
            <div class="intro">
                <h2 style="color: var(--green);">📚 My Personal Informatics Contest Repository</h2>
                <p style="line-height: 1.8; font-size: 17px; margin-top: 15px;">
                    Store different informatics problems, thoughts, images, and C++ solutions.<br>
                    Fully customizable by you.
                </p>
            </div>
        </div>
        
        <div id="branch-content" class="content-area">
            <!-- (内容保持不变) -->
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="branch-title"></h2>
                <div style="display: flex; gap: 10px;">
                    <button onclick="saveCurrentBranch()" style="background: var(--green); color: white; border: none; padding: 10px 24px; border-radius: 9999px;">💾 Save All</button>
                    <button onclick="deleteCurrentBranch()" style="background: #ff6b6b; color: white; border: none; padding: 10px 24px; border-radius: 9999px;">🗑 Delete</button>
                </div>
            </div>
            
            <div>
                <label style="color: var(--green);">📸 Problem Image</label>
                <div onclick="toggleImage()" id="image-section" class="image-section">
                    <p id="upload-prompt">Click to upload image</p>
                    <img id="uploaded-image" style="max-width:100%; max-height:300px; border-radius:15px; display:none;" alt="image">
                </div>
                <input type="file" id="image-input" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
            </div>
            
            <div>
                <label style="color: var(--green);">💭 Thoughts & Solution Ideas</label>
                <textarea id="notes-text" class="note-area" placeholder="Write your thinking process here..."></textarea>
            </div>
            
            <div class="code-section" style="border: 2px solid var(--light-green); border-radius:15px; padding:15px;">
                <label style="color: var(--green);">💻 C++ Code</label>
                <div style="margin:10px 0;">
                    <button onclick="runCode()" style="background:var(--green);color:white;padding:8px 20px;border-radius:9999px;margin-right:10px;">▶️ Run</button>
                    <button onclick="saveCode()" style="background:var(--green);color:white;padding:8px 20px;border-radius:9999px;">Save Code</button>
                </div>
                <textarea id="code-editor"></textarea>
                
                <div style="display:flex; gap:20px; margin-top:15px;">
                    <div style="flex:1;">
                        <label style="color:var(--green);">Input</label>
                        <textarea id="input-text" style="width:100%;height:100px;border:2px solid var(--light-green);border-radius:12px;padding:12px;"></textarea>
                    </div>
                    <div style="flex:1;">
                        <label style="color:var(--green);">Output</label>
                        <textarea id="output-text" readonly style="width:100%;height:100px;border:2px solid var(--light-green);border-radius:12px;padding:12px;"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- CC Modal -->
    <div id="cc-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; width:90%; max-width:1100px; height:80vh; border-radius:25px; display:flex; overflow:hidden;">
            <div style="flex:1; background:#f0fff4; display:flex; align-items:center; justify-content:center; padding:40px;">
                <img id="cc-image" style="max-height:85%; border-radius:20px;" src="https://files.catbox.moe/0v4l2k.jpg">
            </div>
            <div style="flex:1; padding:40px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;">
                <div id="cc-status" style="font-size:22px; font-weight:600; color:var(--green);">No pizza fed today...</div>
                
                <div onclick="feedPizza()" style="width:180px;height:180px;background:#fff9e6;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;">
                    <img src="https://files.catbox.moe/8y5p3v.png" style="width:130px;">
                </div>
                
                <div style="text-align:center;">
                    <div id="pizza-count" style="font-size:32px;color:#ff9800;font-weight:bold;">0</div>
                    <div>Today's Pizzas</div>
                </div>
                <button onclick="closeCCModal()" style="background:var(--green);color:white;padding:12px 40px;border-radius:9999px;">Close</button>
            </div>
        </div>
    </div>
    
    <script>
        // (完整JS代码保持不变，仅更新了图片链接)
        let data = { files: [], currentFileIndex: null, currentBranchIndex: null, pizzas: 0, lastUploadDate: null, hasUploadedToday: false };
        let currentImageData = null;
        let codeMirrorInstance = null;

        function loadData() {
            const saved = localStorage.getItem('informaticsDB');
            if (saved) data = JSON.parse(saved);
            checkDailyReset();
            renderFiles();
        }

        function saveData() { localStorage.setItem('informaticsDB', JSON.stringify(data)); }
        function checkDailyReset() {
            const today = new Date().toISOString().split('T')[0];
            if (data.lastUploadDate !== today) {
                data.hasUploadedToday = false;
                data.lastUploadDate = today;
                saveData();
            }
        }
        function awardPizza() {
            checkDailyReset();
            data.pizzas++;
            data.hasUploadedToday = true;
            saveData();
        }

        function renderFiles() {
            const container = document.getElementById('files-list');
            container.innerHTML = '';
            data.files.forEach((file, fIdx) => {
                const div = document.createElement('div');
                div.style.marginBottom = '8px';
                const btn = document.createElement('button');
                btn.textContent = `📁 ${file.name}`;
                btn.onclick = () => { file.expanded = !file.expanded; renderFiles(); };
                div.appendChild(btn);
                const bdiv = document.createElement('div');
                bdiv.style.display = file.expanded ? 'block' : 'none';
                bdiv.style.marginLeft = '10px';
                file.branches.forEach((b, bIdx) => {
                    const bbtn = document.createElement('button');
                    bbtn.style.fontSize = '14px';
                    bbtn.textContent = `├─ ${b.name}`;
                    bbtn.onclick = () => openBranch(fIdx, bIdx);
                    bdiv.appendChild(bbtn);
                });
                const addb = document.createElement('button');
                addb.textContent = '+ New Branch';
                addb.style.fontSize = '13px';
                addb.style.marginLeft = '25px';
                addb.onclick = () => newBranch(fIdx);
                bdiv.appendChild(addb);
                div.appendChild(bdiv);
                container.appendChild(div);
            });
        }

        function newFile() {
            const name = prompt("File name (e.g. DP Topics)", "New File");
            if (name) {
                data.files.push({name, expanded: true, branches: []});
                saveData(); renderFiles(); awardPizza();
            }
        }

        function newBranch(fIdx) {
            const name = prompt("Branch name (e.g. 0-1 Knapsack)", "New Branch");
            if (name) {
                data.files[fIdx].branches.push({name, notes:"", code:"// C++ Code\n#include <bits/stdc++.h>\nusing namespace std;\nint main() {\n    cout << \"Hello!\" << endl;\n    return 0;\n}", image:null});
                saveData(); renderFiles(); awardPizza();
            }
        }

        function openBranch(fIdx, bIdx) {
            data.currentFileIndex = fIdx;
            data.currentBranchIndex = bIdx;
            const branch = data.files[fIdx].branches[bIdx];
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('branch-content').classList.add('active');
            document.getElementById('branch-title').textContent = `${data.files[fIdx].name} → ${branch.name}`;
            document.getElementById('notes-text').value = branch.notes || "";
            
            currentImageData = branch.image;
            const img = document.getElementById('uploaded-image');
            if (currentImageData) {
                img.src = currentImageData;
                img.style.display = 'block';
                document.getElementById('upload-prompt').style.display = 'none';
            }
            
            if (!codeMirrorInstance) {
                codeMirrorInstance = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
                    mode: "text/x-c++src", lineNumbers: true, indentUnit: 4
                });
            }
            codeMirrorInstance.setValue(branch.code || "");
        }

        function saveCurrentBranch() {
            if (data.currentFileIndex == null) return;
            const branch = data.files[data.currentFileIndex].branches[data.currentBranchIndex];
            branch.notes = document.getElementById('notes-text').value;
            if (codeMirrorInstance) branch.code = codeMirrorInstance.getValue();
            if (currentImageData) branch.image = currentImageData;
            saveData();
            alert("✅ Saved!");
            awardPizza();
        }

        function deleteCurrentBranch() {
            if (confirm("Delete this branch?")) {
                data.files[data.currentFileIndex].branches.splice(data.currentBranchIndex, 1);
                saveData();
                renderFiles();
                document.getElementById('branch-content').classList.remove('active');
                document.getElementById('home-page').classList.add('active');
            }
        }

        function handleImageUpload(e) {
            const reader = new FileReader();
            reader.onload = ev => {
                currentImageData = ev.target.result;
                const img = document.getElementById('uploaded-image');
                img.src = currentImageData;
                img.style.display = 'block';
                document.getElementById('upload-prompt').style.display = 'none';
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        function toggleImage() { document.getElementById('image-input').click(); }
        function runCode() {
            document.getElementById('output-text').value = "Simulated output...\n(Use local IDE for real C++ execution)";
            awardPizza();
        }
        function saveCode() { saveCurrentBranch(); }
        function showHome() {
            document.getElementById('branch-content').classList.remove('active');
            document.getElementById('home-page').classList.add('active');
        }

        function openCCModal() {
            document.getElementById('cc-modal').style.display = 'flex';
            updateCCView();
        }
        function closeCCModal() { document.getElementById('cc-modal').style.display = 'none'; }
        
        function updateCCView() {
            document.getElementById('pizza-count').textContent = data.pizzas;
        }
        
        function feedPizza() {
            if (data.pizzas > 0) {
                data.pizzas--;
                data.hasUploadedToday = true;
                saveData();
                updateCCView();
                alert("🍕 Fed CC~ She looks happy!");
            } else {
                alert("No pizza left today~");
            }
        }

        window.onload = () => {
            loadData();
            if (data.files.length === 0) {
                data.files = [{name: "Basic Algorithms", expanded: true, branches: [{name: "Hello World", notes: "", code: "// Welcome!\n#include <bits/stdc++.h>\nusing namespace std;\nint main() { cout << \"Hello Informatics!\"; }", image: null}]}];
                saveData();
            }
            renderFiles();
        };
    </script>
</body>
</html>
